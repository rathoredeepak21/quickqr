<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#667eea"></rect>
  
  <!-- QR squares -->
  <rect x="15" y="15" width="20" height="20" fill="#fff"></rect>
  <rect x="65" y="15" width="20" height="20" fill="#fff"></rect>
  <rect x="15" y="65" width="20" height="20" fill="#fff"></rect>

  <!-- small blocks -->
  <rect x="45" y="45" width="10" height="10" fill="#fff"></rect>
  <rect x="65" y="65" width="10" height="10" fill="#fff"></rect>

  <!-- lightning bolt -->
  <polygon points="50,25 40,55 55,55 45,80 65,45 50,45" fill="#ffd700"></polygon>
</svg>